<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>MoodLens</title>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --green: #4fffb0;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --border: rgba(124,106,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background glow */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(255,106,158,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 32px 0;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 28px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .badge {
    background: rgba(79,255,176,0.1);
    border: 1px solid rgba(79,255,176,0.3);
    color: var(--green);
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Status bar */
  .status-bar {
    margin: 0 24px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .status-dot.loading { background: #ffb347; animation: pulse 1s infinite; }
  .status-dot.ready { background: var(--green); }
  .status-dot.detecting { background: var(--accent); animation: pulse 0.8s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .status-text {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Camera container */
  .camera-wrap {
    margin: 0 24px;
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .camera-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
  }
  .camera-placeholder .icon {
    font-size: 48px;
    opacity: 0.4;
  }
  .camera-placeholder p {
    font-size: 14px;
    opacity: 0.6;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    border-radius: 24px;
  }
  video.active { display: block; }

  canvas#overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    border-radius: 24px;
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* Emotion result card */
  .result-card {
    margin: 20px 24px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s ease;
  }

  .result-empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  .result-content {
    width: 100%;
    display: none;
  }
  .result-content.visible { display: block; }

  .emotion-main {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .emotion-emoji {
    font-size: 48px;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(124,106,255,0.5));
  }
  .emotion-info {}
  .emotion-label {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: capitalize;
  }
  .emotion-confidence {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Emotion bars */
  .emotion-bars { display: flex; flex-direction: column; gap: 8px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bar-label {
    font-size: 11px;
    color: var(--muted);
    width: 65px;
    text-transform: capitalize;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }
  .bar-pct {
    font-size: 11px;
    color: var(--muted);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Buttons */
  .actions {
    margin: 20px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 16px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 16px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:active { background: rgba(124,106,255,0.05); }

  /* On-device tag */
  .ondevice-tag {
    margin: 16px 24px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--muted);
    font-size: 11px;
  }
  .ondevice-tag span { color: var(--green); font-weight: 500; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div class="logo-text">MoodLens</div>
    </div>
    <div class="badge">ON-DEVICE AI</div>
  </header>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Loading AI models...</div>
  </div>

  <div class="camera-wrap" id="cameraWrap">
    <div class="camera-placeholder" id="placeholder">
      <div class="icon">📷</div>
      <p>Tap "Start Camera" to begin</p>
    </div>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-empty" id="resultEmpty">
      Point camera at a face<br>to detect emotion 👤
    </div>
    <div class="result-content" id="resultContent">
      <div class="emotion-main">
        <div class="emotion-emoji" id="emotionEmoji">😐</div>
        <div class="emotion-info">
          <div class="emotion-label" id="emotionLabel">Neutral</div>
          <div class="emotion-confidence" id="emotionConf">Confidence: 0%</div>
        </div>
      </div>
      <div class="emotion-bars" id="emotionBars"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="startBtn" disabled onclick="startCamera()">⏳ Loading Models...</button>
    <button class="btn-secondary" id="stopBtn" style="display:none" onclick="stopCamera()">■ Stop Camera</button>
  </div>

  <div class="ondevice-tag">
    🔒 <span>100% On-Device</span> · No data leaves your phone · No internet required
  </div>

</div>

<script>
const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

const EMOTION_EMOJI = {
  happy: '😄', sad: '😢', angry: '😠',
  fearful: '😨', disgusted: '🤢', surprised: '😲', neutral: '😐'
};

const EMOTION_COLORS = {
  happy: '#4fffb0', sad: '#6a9eff', angry: '#ff6a6a',
  fearful: '#ffb347', disgusted: '#b47fff', surprised: '#ff6aee', neutral: '#6b6b8a'
};

let detecting = false;
let stream = null;
let animFrame = null;

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const placeholder = document.getElementById('placeholder');
const resultContent = document.getElementById('resultContent');
const resultEmpty = document.getElementById('resultEmpty');

function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

async function loadModels() {
  setStatus('loading', 'Loading AI models on-device...');
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
    ]);
    setStatus('ready', 'AI ready · On-device · No internet needed');
    startBtn.disabled = false;
    startBtn.textContent = '▶ Start Camera';
  } catch (e) {
    setStatus('', 'Model load failed. Check connection once.');
    startBtn.textContent = '↻ Retry';
    startBtn.disabled = false;
    startBtn.onclick = loadModels;
  }
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    video.classList.add('active');
    placeholder.style.display = 'none';
    startBtn.style.display = 'none';
    stopBtn.style.display = 'block';
    setStatus('detecting', 'Detecting emotions on-device...');
    detecting = true;
    video.onloadedmetadata = () => {
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
      detectLoop();
    };
  } catch(e) {
    setStatus('', 'Camera access denied. Please allow camera.');
  }
}

function stopCamera() {
  detecting = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.classList.remove('active');
  placeholder.style.display = 'flex';
  startBtn.style.display = 'block';
  startBtn.textContent = '▶ Start Camera';
  stopBtn.style.display = 'none';
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  resultContent.classList.remove('visible');
  resultEmpty.style.display = 'block';
  setStatus('ready', 'AI ready · On-device · No internet needed');
}

async function detectLoop() {
  if (!detecting) return;
  try {
    const detections = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
      .withFaceExpressions();

    ctx.clearRect(0, 0, overlay.width, overlay.height);

    if (detections.length > 0) {
      const det = detections[0];
      const box = det.detection.box;
      const expressions = det.expressions;

      // Draw face box
      const scaleX = overlay.width / video.videoWidth;
      const scaleY = overlay.height / video.videoHeight;
      ctx.strokeStyle = 'rgba(124,106,255,0.8)';
      ctx.lineWidth = 2;
      ctx.strokeRect(box.x * scaleX, box.y * scaleY, box.width * scaleX, box.height * scaleY);

      // Get top emotion
      const sorted = Object.entries(expressions).sort((a,b) => b[1]-a[1]);
      const [topEmotion, topConf] = sorted[0];

      // Update UI
      document.getElementById('emotionEmoji').textContent = EMOTION_EMOJI[topEmotion] || '😐';
      document.getElementById('emotionLabel').textContent = topEmotion;
      document.getElementById('emotionConf').textContent = `Confidence: ${Math.round(topConf * 100)}%`;

      // Bars
      const barsEl = document.getElementById('emotionBars');
      barsEl.innerHTML = sorted.slice(0, 5).map(([emo, val]) => `
        <div class="bar-row">
          <div class="bar-label">${emo}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(val*100)}%; background: linear-gradient(90deg, ${EMOTION_COLORS[emo] || '#7c6aff'}, #7c6aff)"></div>
          </div>
          <div class="bar-pct">${Math.round(val*100)}%</div>
        </div>
      `).join('');

      resultContent.classList.add('visible');
      resultEmpty.style.display = 'none';
    } else {
      resultContent.classList.remove('visible');
      resultEmpty.style.display = 'block';
    }
  } catch(e) {}

  animFrame = requestAnimationFrame(detectLoop);
}

// Wait for face-api to load then init
window.addEventListener('load', () => {
  setTimeout(loadModels, 1000);
});
</script>
</body>
  </html>
